<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenSCM — Setup</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">

<div class="login-box">
  <div class="card card-outline card-primary">

    <div class="card-header text-center">
      <i class="fas fa-shield-alt fa-2x text-primary"></i>
      <h1 class="h3 mt-2"><b>OpenSCM</b></h1>
      <p class="text-muted mb-0" style="font-size:.85rem;">Security Compliance Manager</p>
    </div>

    <div class="card-body">

      <p class="login-box-msg">
        <span class="badge badge-primary">First-Run Setup</span>
      </p>

      {% if error_message %}
      <div class="alert alert-danger alert-dismissible">
        <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
        <h5><i class="icon fas fa-ban"></i> Error</h5>
        {{ error_message }}
      </div>
      {% endif %}

      <p class="text-muted text-sm mb-3">
        No database was found. Choose an admin password to complete the installation.
        You can change it later from <strong>Admin Settings</strong>.
      </p>

      <form method="post" action="/install">

        <div class="input-group mb-1">
          <input type="password" name="password" class="form-control"
                 placeholder="Admin password" autocomplete="new-password" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-lock"></span></div>
          </div>
        </div>
        <p class="text-muted text-xs mb-3" style="font-size:.78rem; padding-left:2px;">
          Minimum 8 characters.
        </p>

        <div class="input-group mb-4">
          <input type="password" name="confirm_password" class="form-control"
                 placeholder="Confirm password" autocomplete="new-password" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-lock"></span></div>
          </div>
        </div>

        <div class="row">
          <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary px-5">
              <i class="fas fa-rocket mr-1"></i> Complete Setup
            </button>
          </div>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
</body>
</html>
