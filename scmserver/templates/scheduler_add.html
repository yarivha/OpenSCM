{% extends "base.html" %}

{% block content %}
<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1><i class="fas fa-clock mr-2 text-primary"></i>Schedule Report</h1>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <form method="post" action="/scheduler/reports/add">
        <div class="row">
          
          <div class="col-md-6">
            <div class="card card-outline card-primary shadow-sm">
              <div class="card-header"><h3 class="card-title">Schedule Settings</h3></div>
              <div class="card-body">
                <div class="form-group">
                  <label>Job Name</label>
                  <input type="text" name="job_name" class="form-control" placeholder="Monthly Executive Summary" required>
                </div>
                
                <div class="form-group">
                  <label>Target Policy</label>
                  <select name="policy_id" class="form-control">
                    {% for policy in policies %}
                      <option value="{{ policy.id }}">{{ policy.name }}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="form-group">
                  <label>Frequency</label>
                  <select name="frequency" class="form-control">
                    <option value="daily">Daily (00:00)</option>
                    <option value="weekly">Weekly (Sunday)</option>
                    <option value="monthly">Monthly (1st of month)</option>
                    <option value="yearly">Yearly (Jan 1st)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card card-outline card-success shadow-sm">
              <div class="card-header"><h3 class="card-title">Delivery Options</h3></div>
              <div class="card-body">
                <div class="form-group">
                  <label>Action Method</label>
                  <select name="delivery_method" id="delivery_method" class="form-control" onchange="toggleEmailField()">
                    <option value="save">Save to History Only</option>
                    <option value="email">Email Only</option>
                    <option value="both">Both (Save & Email)</option>
                  </select>
                </div>

                <div id="email_group" style="display: none;">
                  <div class="form-group">
                    <label>Recipient Email(s)</label>
                    <div class="input-group">
                      <div class="input-group-prepend"><span class="input-group-text"><i class="fas fa-envelope"></i></span></div>
                      <input type="text" name="recipients" class="form-control" placeholder="admin@openscm.io, ciso@openscm.io">
                    </div>
                    <small class="text-muted">Separate multiple emails with commas.</small>
                  </div>
                </div>

                <div class="alert alert-info mt-3" style="font-size: 0.85rem;">
                  <i class="fas fa-info-circle mr-1"></i> 
                  <strong>Save to History:</strong> Report will appear in the Reports menu.<br>
                  <strong>Email:</strong> A PDF/HTML version will be dispatched.
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="text-right pb-5">
          <hr>
          <a href="/scheduler" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-success px-5 ml-2 shadow-sm">
            <i class="fas fa-save mr-1"></i> Activate Schedule
          </button>
        </div>
      </form>
    </div>
  </section>
</div>

<script>
  function toggleEmailField() {
    const method = document.getElementById('delivery_method').value;
    const emailGroup = document.getElementById('email_group');
    if (method === 'email' || method === 'both') {
      emailGroup.style.display = 'block';
    } else {
      emailGroup.style.display = 'none';
    }
  }
</script>
{% endblock %}
