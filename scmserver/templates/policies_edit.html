{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="/static/plugins/bootstrap4-duallistbox/bootstrap-duallistbox.min.css">
<style>
  .bootstrap-duallistbox-container .btn-group > .btn { border-radius: 4px; margin-bottom: 5px; }
  .info-container { margin-bottom: 5px; font-weight: bold; color: #6c757d; }
  .policy-id-badge { font-size: 0.9rem; vertical-align: middle; }
</style>
{% endblock %}

{% block content %}
<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>
            <i class="fas fa-edit mr-2 text-primary"></i>Edit Policy 
            <span class="badge badge-secondary ml-2 policy-id-badge">ID: {{ policy.id }}</span>
          </h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item"><a href="/policies">Policies</a></li>
            <li class="breadcrumb-item active">Edit Policy</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <form method="post" action="/policies/edit/{{ policy.id }}">
        <div class="row">
          <div class="col-md-12">
            <div class="card card-primary card-outline shadow">
              <div class="card-header">
                <h3 class="card-title">Policy Settings</h3>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-8">
                    <div class="form-group">
                      <label for="name">Policy Name</label>
                      <input type="text" name="name" value="{{ policy.name }}" class="form-control" required>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="form-group">
                      <label for="version">Version</label>
                      <input type="text" name="version" value="{{ policy.version }}" class="form-control" required>
                    </div>
                  </div>
                </div>
                <div class="form-group">
                  <label for="description">Description</label>
                  <textarea name="description" class="form-control" rows="3">{{ policy.description }}</textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="card card-info card-outline shadow-sm">
              <div class="card-header">
                <h3 class="card-title"><i class="fas fa-vial mr-2"></i>Assigned Tests</h3>
              </div>
              <div class="card-body">
                <select name="tests" class="duallistbox" multiple="multiple">
                  {% for test in tests %}
                    <option value="{{ test.id }}"
                      {% for connection in tests_in_policy %}
                        {% if test.id == connection.test_id %}selected="selected"{% endif %}
                      {% endfor %}
                    >
                      {{ test.name }}
                    </option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card card-success card-outline shadow-sm">
              <div class="card-header">
                <h3 class="card-title"><i class="fas fa-layer-group mr-2"></i>Target Groups</h3>
              </div>
              <div class="card-body">
                <select name="system_groups" class="duallistbox" multiple="multiple">
                  {% for group in system_groups %}
                    <option value="{{ group.id }}"
                      {% for connection in systems_in_policy %}
                        {% if group.id == connection.group_id %}selected="selected"{% endif %}
                      {% endfor %}
                    >
                      {{ group.name }}
                    </option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="row pb-5">
          <div class="col-12">
            <div class="card shadow-sm">
              <div class="card-body text-right">
                <a href="/policies" class="btn btn-secondary px-4">Cancel</a>
                <button type="submit" class="btn btn-success px-5 ml-2">
                  <i class="fas fa-save mr-1"></i> Update Policy
                </button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/plugins/bootstrap4-duallistbox/jquery.bootstrap-duallistbox.min.js"></script>
<script>
  $(function () {
    $('.duallistbox').bootstrapDualListbox({
      nonSelectedListLabel: 'Available',
      selectedListLabel: 'Active in Policy',
      preserveSelectionOnMove: 'moved',
      moveOnSelect: false,
      infoText: 'Total {0}',
      infoTextEmpty: 'No items',
      filterPlaceHolder: 'Filter...'
    });
  });
</script>
{% endblock %}
