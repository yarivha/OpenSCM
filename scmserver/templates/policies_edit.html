{% extends "base.html" %}
{% block content %}


<!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1>Edit Policy</h1>
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item"><a href="/">Home</a></li>
	      <li class="breadcrumb-item"><a href="/policies">Policies</a></li>
              <li class="breadcrumb-item active">Edit Policy</li>
            </ol>
          </div>
        </div>
      </div><!-- /.container-fluid -->
    </section>

    <!-- Main content -->
    <section class="content">
      <div class="row">
        <div class="col-md-8">
          <div class="card card-primary">
            <div class="card-header">
              <h3 class="card-title">Policy</h3>
            </div>
	    <form method="post" action="/policies/edit/{{ policy.id }}">
            <div class="card-body"> 
	      <div class="form-group">
	        <label for="inputName">Policy ID</label>
                <input type="text" name="id" placeholder="{{ policy.id }}" class="form-control" disabled>
              </div>
	      <div class="form-group">
                <label for="inputName">Policy Name</label>
		<input type="text" name="name" value="{{ policy.name }}" class="form-control" required>
              </div>
	      <div class="form-group">
                <label for="inputName">Version</label>
                <input type="text" name="version" value="{{ policy.version }}" class="form-control" required>
              </div>
              <div class="form-group">
                <label for="inputDescription">Description</label>
                <textarea name="description" class="form-control" rows="4">{{ policy.description }}</textarea>
              </div>
	      <div class="form-group">
                  <label>Select Tests</label>
                  <select name="tests" class="duallistbox" multiple="multiple">
		    {% for test in tests %}
                     <option value="{{ test.id }}"
		     {% for connection in tests_in_policy %}
			     {% if test.id == connection.test_id %}selected="selected"{%endif %}
		     {% endfor %}
		     >{{ test.name }}</option>
		    {% endfor %} 
                  </select>
              </div>
	      <div class="form-group">
                  <label>Select System Groups</label>
                  <select name="system_groups" class="duallistbox" multiple="multiple">
                    {% for group in system_groups %}
                     <option value="{{ group.id }}"
		     {% for connection in systems_in_policy %}
                             {% if group.id == connection.group_id %}selected="selected"{%endif %}
                     {% endfor %}
		     >{{ group.name }}</option>
                    {% endfor %}
                  </select>
              </div>
	      <div class="text-right">
		<div class="form-group mt-3">
                  <button type="submit" class="btn btn-success">Save Policy</button>
                  <a href="/policies" class="btn btn-secondary">Cancel</a>
                </div>
	      </div>
	    </form>
            </div>
          </div>
        </div>
    </div>
</div>

{% endblock %}
