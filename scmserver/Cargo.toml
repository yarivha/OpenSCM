[package]
name = "scmserver"
version = "0.0.3"
edition = "2024" 
authors = ["Yariv Hakim <yariv@openscm.io>"]
license = "FSL-1.1-ALv2"
description = "Server for Open Security Compliance Manager"


##### Debian metadata #####
[package.metadata.deb]
name = "scmserver"
revision = "0"
section = "utils"
priority = "optional"
maintainer = "Yariv Hakim <yariv@openscm.io>"
copyright = "2026, OpenSCM"
license-file = ["LICENSE", "0"]
conf-files = ["/opt/openscm/scmserver.config"]
maintainer-scripts = "debian/"
assets = [
    ["target/release/scmserver", "/opt/openscm/scmserver", "755"],
    ["debian/scmserver.service", "/lib/systemd/system/scmserver.service", "644"],
]

##### Redhat metadata #####
[package.metadata.generate-rpm]
# Basic Metadata
package = "scmserver"
name = "scmserver"
version = "0.0.3"
release = "0"
summary = "OpenSCM Server"
license = "FSL-1.1-ALv2"
strip = true

post_install_script = """
if [ ! -d /var/log/openscm ]; then
    mkdir -p /var/log/openscm
fi
chmod 755 /var/log/openscm
systemctl daemon-reload
systemctl enable scmserver.service
systemctl restart scmserver.service
echo "RPM: post_install_script executed."
"""

pre_uninstall_script = """
if [ $1 -eq 0 ]; then
    systemctl stop scmserver.service
    systemctl disable scmserver.service
fi
"""

post_uninstall_script = """
if [ $1 -eq 0 ]; then
    rm -rf /var/log/openscm
fi
systemctl daemon-reload
"""

assets = [
    { source = "target/release/scmserver", dest = "/opt/openscm/scmserver", mode = "755" },
    { source = "redhat/scmserver.service", dest = "/lib/systemd/system/scmserver.service", mode = "644" },
]



[dependencies]
axum = { version = "0.8.4", features = ["macros", "json", "tokio"] }
axum-server = "0.7"
axum-extra = { version = "0.10", features = ["cookie"] }
tokio = { version = "1.34", features = ["full"] } 
tower-http = { version = "0.5", features = ["fs"] }
http-body-util = "0.1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_urlencoded = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-log = "0.1"
tera = "1.20"
include_dir = "0.7"
toml = "0.8.0"
urlencoding = "2.1"
mime_guess = "2.0"
chrono = "0.4"
bytes = "1.6" 
base64 = "0.21"
rand = "0.8"
ed25519-dalek = { version = "2", features = ["rand_core"] }
uuid = { version = "1.17", features = ["v4", "serde"] }
bcrypt = "0.17.0"
time = "0.3.41"
bincode = "1.3"
