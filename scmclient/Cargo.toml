[package]
name = "scmclient"
version = "0.0.2"
edition = "2024"
authors = ["Yariv Hakim <yariv@openscm.io>"]

[package.metadata.deb]
name = "scmclient"
maintainer = "Yariv Hakim <yariv@openscm.io>"
copyright = "2026, OpenSCM"
license-file = ["LICENSE", "0"]
# This prevents apt from overwriting the server IP during updates
conf-files = ["/opt/openscm/scmclient.config"]
maintainer-scripts = "debian/"
assets = [
    ["target/release/scmclient", "/opt/openscm/scmclient", "755"],
    ["debian/scmclient.service", "/lib/systemd/system/scmclient.service", "644"],
]


[dependencies]
sys-info = "0.9"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["rustls-tls", "json", "gzip"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
local-ip-address = "0.5"
gethostname = "0.2"
openssl = { version = "0.10", features = ["vendored"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-log = "0.1"
tracing = "0.1"
toml = "0.8.23"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
base64 = "0.22.1"
sha2 = "0.10.9"
hex = "0.4"
bincode = "1.3"
semver = "1.0"
