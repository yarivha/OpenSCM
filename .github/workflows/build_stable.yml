name: OpenSCM Production Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:

  # ── LINUX CLIENTS ─────────────────────────────────────────────────────────
  # x86_64 / aarch64 / armv7 / riscv64 / ppc64le  →  deb + rpm + archlinux
  # s390x / i686 / loongarch64                     →  deb + rpm only
  # Raw binaries for x86_64 and aarch64 are also uploaded for agent bundling.
  build-linux-client:
    name: Linux · client · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - riscv64gc-unknown-linux-musl
          - powerpc64le-unknown-linux-musl
          - s390x-unknown-linux-gnu
          - i686-unknown-linux-musl
          - loongarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build Binary
        run: |
          mkdir -p dist build/bin
          cargo zigbuild --release --target ${{ matrix.target }} -p scmclient
          cp target/${{ matrix.target }}/release/scmclient build/bin/

      - name: Package
        run: |
          case "${{ matrix.target }}" in
            x86_64-*)        ARCH=amd64      ;;
            aarch64-*)       ARCH=arm64      ;;
            armv7-*)         ARCH=armhf      ;;
            riscv64gc-*)     ARCH=riscv64    ;;
            powerpc64le-*)   ARCH=ppc64le    ;;
            s390x-*)         ARCH=s390x      ;;
            loongarch64-*)   ARCH=loong64    ;;
            i686-*)          ARCH=386        ;;
          esac
          export ARCH
          export VERSION=$(grep -m1 '^version =' scmclient/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=1
          if [[ "${{ matrix.target }}" == s390x-* ]] || \
             [[ "${{ matrix.target }}" == i686-* ]] || \
             [[ "${{ matrix.target }}" == loongarch64-* ]]; then
            PACKAGERS="deb rpm"
          else
            PACKAGERS="deb rpm archlinux"
          fi
          for PKG in $PACKAGERS; do
            nfpm pkg --packager $PKG --config config/scmclient.yaml --target dist/
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-client-${{ matrix.target }}
          path: dist/*
          retention-days: 1

      # Upload raw binary for agent bundling (only the two targets we serve as server upgrades)
      - name: Upload Raw Binary for Agent Bundle
        if: |
          matrix.target == 'x86_64-unknown-linux-musl' ||
          matrix.target == 'aarch64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: raw-client-${{ matrix.target }}
          path: build/bin/scmclient
          retention-days: 1


  # ── LINUX SERVERS ─────────────────────────────────────────────────────────
  # x86_64 / aarch64 only  →  deb + rpm
  # Depends on collect-agents so agent binaries are bundled into the package.
  build-linux-server:
    name: Linux · server · ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: collect-agents
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      # Stage agent binaries into the server's static dir BEFORE compiling so
      # include_dir! embeds them into the resulting scmserver binary.
      - name: Stage Embedded Agent Binaries
        uses: actions/download-artifact@v4
        with:
          name: agents-bundle
          path: scmserver/static/agents

      - name: Build Binary
        run: |
          mkdir -p dist build/bin
          cargo zigbuild --release --target ${{ matrix.target }} -p scmserver
          cp target/${{ matrix.target }}/release/scmserver build/bin/

      - name: Package
        run: |
          case "${{ matrix.target }}" in
            x86_64-*)  ARCH=amd64  ;;
            aarch64-*) ARCH=arm64  ;;
          esac
          export ARCH
          export VERSION=$(grep -m1 '^version =' scmserver/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=1
          for PKG in deb rpm; do
            nfpm pkg --packager $PKG --config config/scmserver.yaml --target dist/
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-server-${{ matrix.target }}
          path: dist/*
          retention-days: 1


  # ── WINDOWS CLIENT ────────────────────────────────────────────────────────
  build-windows-client:
    name: Windows · client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          cargo install cargo-zigbuild
          rustup target add x86_64-pc-windows-gnu

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build and Package
        run: |
          mkdir -p dist build/bin
          VERSION=$(grep -m1 '^version =' scmclient/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=1
          cargo zigbuild --release --target x86_64-pc-windows-gnu -p scmclient
          cp target/x86_64-pc-windows-gnu/release/scmclient.exe build/bin/scmclient.exe
          cp target/x86_64-pc-windows-gnu/release/scmclient.exe \
             scmclient/package/windows/scmclient.exe
          INSTALLER="scmclient-${VERSION}-${RELEASE}-x86_64.exe"
          makensis -DVERSION="$VERSION" -DRELEASE="$RELEASE" \
            "-DINSTALLER_NAME=${INSTALLER}" \
            scmclient/package/windows/scmclient.nsi
          mv "scmclient/package/windows/${INSTALLER}" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-client
          path: dist/*
          retention-days: 1

      - name: Upload Raw Binary for Agent Bundle
        uses: actions/upload-artifact@v4
        with:
          name: raw-client-windows-x86_64
          path: build/bin/scmclient.exe
          retention-days: 1


  # ── WINDOWS SERVER ────────────────────────────────────────────────────────
  build-windows-server:
    name: Windows · server
    runs-on: ubuntu-latest
    needs: collect-agents
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          cargo install cargo-zigbuild
          rustup target add x86_64-pc-windows-gnu

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Stage Embedded Agent Binaries
        uses: actions/download-artifact@v4
        with:
          name: agents-bundle
          path: scmserver/static/agents

      - name: Build and Package
        run: |
          mkdir -p dist build/bin
          VERSION=$(grep -m1 '^version =' scmserver/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=1
          cargo zigbuild --release --target x86_64-pc-windows-gnu -p scmserver
          cp target/x86_64-pc-windows-gnu/release/scmserver.exe \
             scmserver/package/windows/scmserver.exe
          INSTALLER="scmserver-${VERSION}-${RELEASE}-x86_64.exe"
          makensis -DVERSION="$VERSION" -DRELEASE="$RELEASE" \
            "-DINSTALLER_NAME=${INSTALLER}" \
            scmserver/package/windows/scmserver.nsi
          mv "scmserver/package/windows/${INSTALLER}" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-server
          path: dist/*
          retention-days: 1


  # ── MACOS (universal .pkg + thin binaries for agent bundle) ───────────────
  build-macos-client:
    name: macOS · Client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Package
        run: |
          mkdir -p dist build/bin build/agents-raw-macos
          APP_NAME=scmclient
          VERSION=$(grep -m1 '^version =' ${APP_NAME}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=1
          IDENTIFIER="io.openscm.${APP_NAME}"
          STAGE_DIR="/tmp/pkg-create"

          # Universal binary — build each arch separately then combine with lipo
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin -p $APP_NAME
          cargo build --release --target x86_64-apple-darwin  -p $APP_NAME

          # Preserve thin binaries for agent bundling before lipo merges them
          cp target/aarch64-apple-darwin/release/$APP_NAME build/agents-raw-macos/scmclient-aarch64
          cp target/x86_64-apple-darwin/release/$APP_NAME  build/agents-raw-macos/scmclient-x86_64

          lipo -create \
            target/aarch64-apple-darwin/release/$APP_NAME \
            target/x86_64-apple-darwin/release/$APP_NAME \
            -output build/bin/$APP_NAME

          # Stage files
          # Note: use "pkg-scripts" not "scripts" — macOS filesystem is case-insensitive
          # so a dir named "scripts" and a file named "Scripts" would collide
          mkdir -p "${STAGE_DIR}/root/usr/local/bin" \
                   "${STAGE_DIR}/root/Library/LaunchDaemons" \
                   "${STAGE_DIR}/pkg-scripts"
          cp "build/bin/${APP_NAME}" "${STAGE_DIR}/root/usr/local/bin/${APP_NAME}"
          chmod 755 "${STAGE_DIR}/root/usr/local/bin/${APP_NAME}"
          cp "${APP_NAME}/package/darwin/${IDENTIFIER}.plist" "${STAGE_DIR}/root/Library/LaunchDaemons/"
          chmod 644 "${STAGE_DIR}/root/Library/LaunchDaemons/${IDENTIFIER}.plist"

          # PackageInfo
          if ! command -v envsubst &>/dev/null; then brew install gettext; fi
          export IDENTIFIER VERSION
          export INSTALL_KBYTES=$(du -sk "${STAGE_DIR}/root" | awk '{print $1}')
          export FILE_COUNT=$(find "${STAGE_DIR}/root" -type f | wc -l)
          $(brew --prefix gettext)/bin/envsubst \
            '${IDENTIFIER} ${VERSION} ${INSTALL_KBYTES} ${FILE_COUNT}' \
            < "${APP_NAME}/package/darwin/PackageInfo" > "${STAGE_DIR}/PackageInfo"

          # Scripts and payload archives
          cp "${APP_NAME}/package/darwin/preinstall"  "${STAGE_DIR}/pkg-scripts/" 2>/dev/null || true
          cp "${APP_NAME}/package/darwin/postinstall" "${STAGE_DIR}/pkg-scripts/" 2>/dev/null || true
          chmod +x "${STAGE_DIR}/pkg-scripts/"*install 2>/dev/null || true
          (cd "${STAGE_DIR}/root"        && find . -type f | sed 's|^\./||' | pax -w -x cpio | gzip -9n > "${STAGE_DIR}/Payload")
          (cd "${STAGE_DIR}"             && mkbom root Bom)
          (cd "${STAGE_DIR}/pkg-scripts" && find . -type f | sed 's|^\./||' | pax -w -x cpio | gzip -9n > "${STAGE_DIR}/Scripts")
          (cd "${STAGE_DIR}"             && xar --compression none -c \
            -f "${{ github.workspace }}/dist/${APP_NAME}_${VERSION}-${RELEASE}_macos.pkg" \
            Payload Bom PackageInfo Scripts)

      - uses: actions/upload-artifact@v4
        with:
          name: macos-client
          path: dist/*
          retention-days: 1

      - name: Upload Raw Binaries for Agent Bundle
        uses: actions/upload-artifact@v4
        with:
          name: raw-client-macos
          path: build/agents-raw-macos/
          retention-days: 1


  # ── FREEBSD (.pkg) ────────────────────────────────────────────────────────
  # zigbuild can't cross-compile sysinfo's FreeBSD backend (needs libkvm/libprocstat).
  # We use a QEMU FreeBSD VM via cross-platform-actions for a native build instead.
  build-freebsd-client:
    name: FreeBSD · Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Binary (FreeBSD VM)
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: freebsd
          version: '14.2'
          run: |
            sudo pkg install -y rust
            mkdir -p build/bin
            cargo build --release -p scmclient
            cp target/release/scmclient build/bin/

      - name: Package
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          APP_NAME=scmclient
          VERSION=$(grep -m1 '^version =' ${APP_NAME}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=1

          mkdir -p dist
          PKG_STAGE="/tmp/pkg-create"
          mkdir -p "$PKG_STAGE/usr/local/bin" "$PKG_STAGE/usr/local/etc/rc.d"
          cp "build/bin/${APP_NAME}" "$PKG_STAGE/usr/local/bin/${APP_NAME}"
          cp "${APP_NAME}/package/freebsd/${APP_NAME}.rc" "$PKG_STAGE/usr/local/etc/rc.d/${APP_NAME}"
          chmod 555 "$PKG_STAGE/usr/local/bin/${APP_NAME}" "$PKG_STAGE/usr/local/etc/rc.d/${APP_NAME}"

          export APP_NAME VERSION
          export FLAT_SIZE=$(($(wc -c < "build/bin/$APP_NAME") + $(wc -c < "$PKG_STAGE/usr/local/etc/rc.d/$APP_NAME")))
          export BIN_MTIME=$(stat -c %Y "build/bin/$APP_NAME")
          export RC_MTIME=$(stat -c %Y "$PKG_STAGE/usr/local/etc/rc.d/$APP_NAME")

          envsubst '${APP_NAME} ${VERSION} ${FLAT_SIZE} ${BIN_MTIME} ${RC_MTIME}' \
            < "${APP_NAME}/package/freebsd/MANIFEST.template" > "$PKG_STAGE/+MANIFEST"
          envsubst '${APP_NAME} ${VERSION} ${FLAT_SIZE} ${BIN_MTIME} ${RC_MTIME}' \
            < "${APP_NAME}/package/freebsd/COMPACT_MANIFEST.template" > "$PKG_STAGE/+COMPACT_MANIFEST"

          tar -cJf "dist/${APP_NAME}-${VERSION}-${RELEASE}-freebsd-amd64.pkg" \
            -C "$PKG_STAGE" +MANIFEST +COMPACT_MANIFEST \
            --transform 's|^usr/|/usr/|' \
            -C "$PKG_STAGE" usr/local/bin/${APP_NAME} usr/local/etc/rc.d/${APP_NAME}

      - uses: actions/upload-artifact@v4
        with:
          name: freebsd-client
          path: dist/*
          retention-days: 1

      - name: Upload Raw Binary for Agent Bundle
        uses: actions/upload-artifact@v4
        with:
          name: raw-client-freebsd-amd64
          path: build/bin/scmclient
          retention-days: 1


  # ── COLLECT AGENTS ────────────────────────────────────────────────────────
  # Gathers all raw client binaries, renames them to the canonical
  # scmclient-{arch}-{os}[.exe] scheme expected by agents::startup_scan,
  # and uploads as a single artifact that the server build jobs download into
  # scmserver/static/agents/ before compiling so include_dir! embeds them.
  collect-agents:
    name: Collect · Agent Binaries
    runs-on: ubuntu-latest
    needs:
      - build-linux-client
      - build-windows-client
      - build-macos-client
      - build-freebsd-client
    steps:
      - uses: actions/checkout@v4

      - name: Download Raw Client Binaries
        uses: actions/download-artifact@v4
        with:
          pattern: raw-client-*
          path: raw-clients
          merge-multiple: false

      - name: Stage Agent Binaries
        run: |
          mkdir -p build/agents
          VERSION=$(grep -m1 '^version =' scmclient/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          # Linux
          cp raw-clients/raw-client-x86_64-unknown-linux-musl/scmclient \
             build/agents/scmclient-x86_64-linux
          cp raw-clients/raw-client-aarch64-unknown-linux-musl/scmclient \
             build/agents/scmclient-aarch64-linux

          # Windows
          cp raw-clients/raw-client-windows-x86_64/scmclient.exe \
             build/agents/scmclient-x86_64-windows.exe

          # macOS (thin binaries preserved before lipo in build-macos-client)
          cp raw-clients/raw-client-macos/scmclient-aarch64 \
             build/agents/scmclient-aarch64-macos
          cp raw-clients/raw-client-macos/scmclient-x86_64 \
             build/agents/scmclient-x86_64-macos

          # FreeBSD
          cp raw-clients/raw-client-freebsd-amd64/scmclient \
             build/agents/scmclient-x86_64-freebsd

          # Make all Unix binaries executable
          chmod 755 build/agents/scmclient-x86_64-linux \
                     build/agents/scmclient-aarch64-linux \
                     build/agents/scmclient-aarch64-macos \
                     build/agents/scmclient-x86_64-macos \
                     build/agents/scmclient-x86_64-freebsd

          echo "Staged agents for v${VERSION}:"
          ls -lh build/agents/

      - uses: actions/upload-artifact@v4
        with:
          name: agents-bundle
          path: build/agents/
          retention-days: 1


  # ── DOCKER (amd64 + arm64 → Docker Hub) ──────────────────────────────────
  build-docker:
    name: Docker · ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: collect-agents
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
            platform: linux/amd64
          - arch: arm64
            target: aarch64-unknown-linux-musl
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Tools
        run: |
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Stage Embedded Agent Binaries
        uses: actions/download-artifact@v4
        with:
          name: agents-bundle
          path: scmserver/static/agents

      - name: Build Server Binary
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p scmserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        run: |
          VERSION=$(grep -m1 '^version =' scmserver/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p /tmp/docker-stage
          cp target/${{ matrix.target }}/release/scmserver /tmp/docker-stage/scmserver

          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg VERSION=$VERSION \
            --tag openscm/scmserver:${VERSION}-${{ matrix.arch }} \
            --push \
            -f scmserver/package/docker/Dockerfile \
            /tmp/docker-stage


  # ── DOCKER MANIFEST (combine amd64 + arm64) ───────────────────────────────
  docker-manifest:
    name: Docker · Manifest
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          VERSION=$(grep -m1 '^version =' scmserver/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          docker buildx imagetools create \
            -t openscm/scmserver:${VERSION} \
            -t openscm/scmserver:latest \
            openscm/scmserver:${VERSION}-amd64 \
            openscm/scmserver:${VERSION}-arm64


  # ── DRAFT RELEASE ─────────────────────────────────────────────────────────
  publish:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-client
      - build-linux-server
      - build-windows-client
      - build-windows-server
      - build-macos-client
      - build-freebsd-client
      - docker-manifest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Changelog for this Version
        id: changelog
        run: |
          VERSION=$(grep -m1 '^version =' scmserver/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          # Extract the section between ## [VERSION] and the next ## [
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Pass multiline output to GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-packages
          merge-multiple: true
          # Only pull packaged release artifacts; exclude raw-client-* and agents-bundle
          pattern: '{linux-*,windows-*,macos-*,freebsd-*}'

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./all-packages/*
          name: OpenSCM ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ── CLEANUP ──────────────────────────────────────────────────────────────
  # Delete this workflow run's own artifacts now that they've been duplicated
  # into the GitHub Release as durable release assets. Release assets are
  # stored separately and don't count against the artifact-storage quota.
  cleanup:
    name: Cleanup build artifacts
    runs-on: ubuntu-latest
    needs: [publish]
    if: success()
    permissions:
      actions: write
    steps:
      - name: Delete workflow artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate \
            /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[].id' \
          | xargs -r -I{} gh api -X DELETE \
            /repos/${{ github.repository }}/actions/artifacts/{}
