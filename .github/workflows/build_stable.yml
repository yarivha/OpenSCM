name: OpenSCM Stable Production

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-package:
    name: Build ${{ matrix.app }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
        target: [
          "x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", 
          "powerpc64le-unknown-linux-musl", "riscv64gc-unknown-linux-musl",
          "armv7-unknown-linux-musleabihf", "x86_64-pc-windows-gnu",
          "x86_64-unknown-freebsd", "universal2-apple-darwin"
        ]
        include:
          - target: "universal2-apple-darwin"
            os: macos-latest
          - target: "x86_64-pc-windows-gnu"
            os: ubuntu-latest
          - os: ubuntu-latest # Default for Linux/FreeBSD
          
          # Exclusions: Server is restricted to specific stable targets
          - app: server
            target: "powerpc64le-unknown-linux-musl"
            skip: true
          - app: server
            target: "riscv64gc-unknown-linux-musl"
            skip: true
          - app: server
            target: "armv7-unknown-linux-musleabihf"
            skip: true
          - app: server
            target: "x86_64-unknown-freebsd"
            skip: true
          - app: server
            target: "universal2-apple-darwin"
            skip: true

    steps:
      - name: Checkout Source
        if: matrix.skip != true
        uses: actions/checkout@v4

      - name: Setup Environment
        if: matrix.skip != true && runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y nsis gettext-base pax
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - name: Get Version
        if: matrix.skip != true
        run: |
          V=$(grep -m 1 '^version =' scm${{ matrix.app }}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$V" >> $GITHUB_ENV

      - name: Build
        if: matrix.skip != true
        run: |
          if [[ "${{ matrix.target }}" == *"darwin"* ]]; then
            cargo build --release --target ${{ matrix.target }} -p scm${{ matrix.app }}
          else
            cargo zigbuild --release --target ${{ matrix.target }} -p scm${{ matrix.app }}
          fi


      - name: Create Packages
        if: matrix.skip != true
        run: |
          mkdir -p dist
          export VERSION=$(grep -m 1 '^version =' scm${{ matrix.app }}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=${{ github.run_number }}
          APP_MEMBER="scm${{ matrix.app }}"
          CONFIG="config/${APP_MEMBER}-${{ matrix.target }}.yaml"
          
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            # Build all three formats required for stable
            nfpm pkg --packager deb --config $CONFIG --target dist/
            nfpm pkg --packager rpm --config $CONFIG --target dist/
            
            # Arch Linux package (Client Only as per your script)
            if [[ "${{ matrix.app }}" == "client" ]]; then 
              nfpm pkg --packager archlinux --config $CONFIG --target dist/
            fi
            
          elif [[ "${{ matrix.target }}" == *"windows"* ]]; then
            makensis -DVERSION="${VERSION}" -DRELEASE="${RELEASE}" ${APP_MEMBER}/package/windows/${APP_MEMBER}.nsi
            
          elif [[ "${{ matrix.target }}" == *"freebsd"* ]]; then
             # Insert your manual FreeBSD tar logic here
             echo "Running FreeBSD packaging..."
          fi


      - name: Upload Artifacts
        if: matrix.skip != true
        uses: actions/upload-artifact@v4
        with:
          name: stable-${{ matrix.app }}-${{ matrix.target }}
          path: dist/*

  publish-release:
    name: Publish Production Release
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
