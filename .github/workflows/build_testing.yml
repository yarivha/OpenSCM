name: OpenSCM Testing Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build-and-package:
    name: ${{ matrix.app }} · ${{ matrix.target }}
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - riscv64gc-unknown-linux-musl
          - powerpc64le-unknown-linux-musl
          - x86_64-pc-windows-gnu
          - universal2-apple-darwin
        include:
          - target: universal2-apple-darwin
            os: macos-latest
        exclude:
          # Server only supported on x86_64 and ARM64 (Linux) and x86_64 Windows
          - app: server
            target: armv7-unknown-linux-musleabihf
          - app: server
            target: riscv64gc-unknown-linux-musl
          - app: server
            target: powerpc64le-unknown-linux-musl
          - app: server
            target: universal2-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux/Windows/FreeBSD Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y nsis gettext-base pax
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2
        if: runner.os == 'Linux'

      - name: Build Binary
        run: |
          mkdir -p dist build/bin
          BINARY_NAME="scm${{ matrix.app }}"

          if [[ "${{ matrix.target }}" == *"darwin"* ]]; then
            # Universal binary via lipo (universal2 target unreliable on ARM64 runner)
            rustup target add aarch64-apple-darwin x86_64-apple-darwin
            cargo build --release --target aarch64-apple-darwin -p $BINARY_NAME
            cargo build --release --target x86_64-apple-darwin  -p $BINARY_NAME
            lipo -create \
              target/aarch64-apple-darwin/release/$BINARY_NAME \
              target/x86_64-apple-darwin/release/$BINARY_NAME \
              -output build/bin/$BINARY_NAME
          else
            cargo zigbuild --release --target ${{ matrix.target }} -p $BINARY_NAME
            # Stage binary — Windows target produces .exe, others have no extension
            if [[ "${{ matrix.target }}" == *"windows"* ]]; then
              cp "target/${{ matrix.target }}/release/${BINARY_NAME}.exe" build/bin/
            else
              cp "target/${{ matrix.target }}/release/${BINARY_NAME}" build/bin/
            fi
          fi

      - name: Package Linux
        if: contains(matrix.target, 'linux')
        run: |
          case "${{ matrix.target }}" in
            x86_64-*)       ARCH=amd64   ;;
            aarch64-*)      ARCH=arm64   ;;
            armv7-*)        ARCH=arm7    ;;
            riscv64gc-*)    ARCH=riscv64 ;;
            powerpc64le-*)  ARCH=ppc64le ;;
          esac
          export ARCH
          export VERSION=$(grep -m1 '^version =' scm${{ matrix.app }}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=${{ github.run_number }}
          # Server: deb + rpm only. Client: deb + rpm + archlinux
          if [[ "${{ matrix.app }}" == "server" ]]; then
            PACKAGERS="deb rpm"
          else
            PACKAGERS="deb rpm archlinux"
          fi
          for PKG in $PACKAGERS; do
            nfpm pkg --packager $PKG --config config/scm${{ matrix.app }}.yaml --target dist/
          done

      - name: Package Windows
        if: contains(matrix.target, 'windows')
        run: |
          VERSION=$(grep -m1 '^version =' scm${{ matrix.app }}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=${{ github.run_number }}
          # Copy binary next to the .nsi script (NSIS CDs to script dir at compile time)
          cp build/bin/scm${{ matrix.app }}.exe \
             scm${{ matrix.app }}/package/windows/scm${{ matrix.app }}.exe
          INSTALLER="scm${{ matrix.app }}-${VERSION}-windows-x86_64.exe"
          makensis -DVERSION="$VERSION" -DRELEASE="$RELEASE" \
            "-DINSTALLER_NAME=${INSTALLER}" \
            scm${{ matrix.app }}/package/windows/scm${{ matrix.app }}.nsi
          mv "scm${{ matrix.app }}/package/windows/${INSTALLER}" dist/

      - name: Package macOS
        if: contains(matrix.target, 'darwin')
        run: |
          APP_NAME="scm${{ matrix.app }}"
          VERSION=$(grep -m1 '^version =' ${APP_NAME}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=${{ github.run_number }}
          IDENTIFIER="io.openscm.${APP_NAME}"
          STAGE_DIR="/tmp/pkg-create"

          # Note: use "pkg-scripts" not "scripts" — macOS filesystem is case-insensitive
          # so a dir named "scripts" and a file named "Scripts" would collide
          mkdir -p "${STAGE_DIR}/root/usr/local/bin" \
                   "${STAGE_DIR}/root/Library/LaunchDaemons" \
                   "${STAGE_DIR}/pkg-scripts"
          cp "build/bin/${APP_NAME}" "${STAGE_DIR}/root/usr/local/bin/${APP_NAME}"
          chmod 755 "${STAGE_DIR}/root/usr/local/bin/${APP_NAME}"
          cp "${APP_NAME}/package/darwin/${IDENTIFIER}.plist" "${STAGE_DIR}/root/Library/LaunchDaemons/"
          chmod 644 "${STAGE_DIR}/root/Library/LaunchDaemons/${IDENTIFIER}.plist"

          if ! command -v envsubst &>/dev/null; then brew install gettext; fi
          export IDENTIFIER VERSION
          export INSTALL_KBYTES=$(du -sk "${STAGE_DIR}/root" | awk '{print $1}')
          export FILE_COUNT=$(find "${STAGE_DIR}/root" -type f | wc -l)
          $(brew --prefix gettext)/bin/envsubst \
            '${IDENTIFIER} ${VERSION} ${INSTALL_KBYTES} ${FILE_COUNT}' \
            < "${APP_NAME}/package/darwin/PackageInfo" > "${STAGE_DIR}/PackageInfo"

          cp "${APP_NAME}/package/darwin/preinstall"  "${STAGE_DIR}/pkg-scripts/" 2>/dev/null || true
          cp "${APP_NAME}/package/darwin/postinstall" "${STAGE_DIR}/pkg-scripts/" 2>/dev/null || true
          chmod +x "${STAGE_DIR}/pkg-scripts/"*install 2>/dev/null || true
          (cd "${STAGE_DIR}/root"        && find . -type f | sed 's|^\./||' | pax -w -x cpio | gzip -9n > "${STAGE_DIR}/Payload")
          (cd "${STAGE_DIR}"             && mkbom root Bom)
          (cd "${STAGE_DIR}/pkg-scripts" && find . -type f | sed 's|^\./||' | pax -w -x cpio | gzip -9n > "${STAGE_DIR}/Scripts")
          (cd "${STAGE_DIR}"             && xar --compression none -c \
            -f "${{ github.workspace }}/dist/${APP_NAME}_${VERSION}_macos.pkg" \
            Payload Bom PackageInfo Scripts)

      - uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.app }}-${{ matrix.target }}
          path: dist/*


  # ── FREEBSD (native QEMU VM — zigbuild can't cross-compile sysinfo) ──────
  build-freebsd:
    name: client · freebsd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Binary (FreeBSD VM)
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: freebsd
          version: '14.2'
          run: |
            sudo pkg install -y rust
            mkdir -p build/bin
            cargo build --release -p scmclient
            cp target/release/scmclient build/bin/

      - name: Package FreeBSD
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          APP_NAME=scmclient
          VERSION=$(grep -m1 '^version =' ${APP_NAME}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=${{ github.run_number }}

          mkdir -p dist
          PKG_STAGE="/tmp/pkg-create"
          mkdir -p "$PKG_STAGE/usr/local/bin" "$PKG_STAGE/usr/local/etc/rc.d"
          cp "build/bin/${APP_NAME}" "$PKG_STAGE/usr/local/bin/${APP_NAME}"
          cp "${APP_NAME}/package/freebsd/${APP_NAME}.rc" "$PKG_STAGE/usr/local/etc/rc.d/${APP_NAME}"
          chmod 555 "$PKG_STAGE/usr/local/bin/${APP_NAME}" "$PKG_STAGE/usr/local/etc/rc.d/${APP_NAME}"

          export APP_NAME VERSION
          export FLAT_SIZE=$(($(wc -c < "build/bin/$APP_NAME") + $(wc -c < "$PKG_STAGE/usr/local/etc/rc.d/$APP_NAME")))
          export BIN_MTIME=$(stat -c %Y "build/bin/$APP_NAME")
          export RC_MTIME=$(stat -c %Y "$PKG_STAGE/usr/local/etc/rc.d/$APP_NAME")

          envsubst '${APP_NAME} ${VERSION} ${FLAT_SIZE} ${BIN_MTIME} ${RC_MTIME}' \
            < "${APP_NAME}/package/freebsd/MANIFEST.template" > "$PKG_STAGE/+MANIFEST"
          envsubst '${APP_NAME} ${VERSION} ${FLAT_SIZE} ${BIN_MTIME} ${RC_MTIME}' \
            < "${APP_NAME}/package/freebsd/COMPACT_MANIFEST.template" > "$PKG_STAGE/+COMPACT_MANIFEST"

          tar -cJf "dist/${APP_NAME}-${VERSION}-freebsd-x86_64.pkg" \
            -C "$PKG_STAGE" +MANIFEST +COMPACT_MANIFEST \
            --transform 's|^usr/|/usr/|' \
            -C "$PKG_STAGE" usr/local/bin/${APP_NAME} usr/local/etc/rc.d/${APP_NAME}

      - uses: actions/upload-artifact@v4
        with:
          name: test-client-freebsd
          path: dist/*
