name: OpenSCM Manual Testing

on:
  workflow_dispatch:

jobs:
  test-build:
    name: Test Build ${{ matrix.app }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, server]
        target: ["aarch64-unknown-linux-musl", "x86_64-pc-windows-gnu"]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      # --- ADD THIS STEP ---
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0 # Or your preferred version

      - name: Build
        run: |
          # Stage binary directory for nFPM
          mkdir -p build/bin
          cargo zigbuild --release --target ${{ matrix.target }} -p scm${{ matrix.app }}
          cp target/${{ matrix.target }}/release/scm${{ matrix.app }} build/bin/


      - name: Package
        run: |
          mkdir -p dist
          # Determine version and release
          export VERSION=$(grep -m 1 '^version =' scm${{ matrix.app }}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=${{ github.run_number }}
          
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            # Added --packager deb to fix the directory error
            nfpm pkg --packager deb \
              --config config/scm${{ matrix.app }}-${{ matrix.target }}.yaml \
              --target dist/
          else
            # Replicating your script's NSIS logic
            makensis -DVERSION="${VERSION}" \
                     -DRELEASE="${RELEASE}" \
                     -DINSTALLER_NAME="dist/scm${{ matrix.app }}_${VERSION}-${RELEASE}_x86.exe" \
                     scm${{ matrix.app }}/package/windows/scm${{ matrix.app }}.nsi
          fi



      - name: Upload Testing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.app }}-${{ matrix.target }}
          path: dist/*
