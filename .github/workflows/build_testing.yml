name: OpenSCM Optimized Testing

on:
  workflow_dispatch:

jobs:
  # STAGE 1: Compile the binaries once per architecture
  compile:
    name: Compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ["aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl", "x86_64-pc-windows-gnu"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust & Zig
        run: |
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}
      
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Build Binaries
        run: |
          # Build both client and server in this runner to save setup time
          cargo zigbuild --release --target ${{ matrix.target }} -p scmclient
          cargo zigbuild --release --target ${{ matrix.target }} -p scmserver
          
          # Stage them for the next job
          mkdir -p build/bin
          cp target/${{ matrix.target }}/release/scmclient* build/bin/
          cp target/${{ matrix.target }}/release/scmserver* build/bin/

      - name: Upload Raw Binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: build/bin/*
          retention-days: 1

  # STAGE 2: Create all package formats in parallel
  package:
    needs: compile
    name: Package ${{ matrix.app }} (${{ matrix.format }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, server]
        # Define formats only for Linux ARM; Windows uses a separate include
        format: [deb, rpm, archlinux]
        include:
          - app: client
            format: nsis
            target: "x86_64-pc-windows-gnu"
          - app: server
            format: nsis
            target: "x86_64-pc-windows-gnu"
        # Skip standard Linux formats for Windows target
        exclude:
          - format: deb
            app: client
          - format: rpm
            app: client
          - format: archlinux
            app: client
          # (Repeat for server as needed)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Download Compiled Binaries
        uses: actions/download-artifact@v4
        with:
          # Logic to pick the right architecture artifact
          name: binaries-${{ matrix.target || 'aarch64-unknown-linux-musl' }}
          path: build/bin

      - name: Create Final Package
        run: |
          mkdir -p dist
          VERSION=$(grep -m 1 '^version =' scm${{ matrix.app }}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=${{ github.run_number }}
          
          if [[ "${{ matrix.format }}" == "nsis" ]]; then
            makensis -DVERSION="$VERSION" -DRELEASE="$RELEASE" scm${{ matrix.app }}/package/windows/scm${{ matrix.app }}.nsi
            mv scm${{ matrix.app }}/package/windows/*.exe dist/
          else
            nfpm pkg --packager ${{ matrix.format }} --config config/scm${{ matrix.app }}.yaml --target dist/
          fi

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.format }}
          path: dist/*
