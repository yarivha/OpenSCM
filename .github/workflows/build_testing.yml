name: OpenSCM Manual Testing

on:
  workflow_dispatch:

jobs:
  test-build:
    name: Test Build ${{ matrix.app }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, server]
        target: ["aarch64-unknown-linux-musl", "x86_64-pc-windows-gnu"]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Build
        run: |
          mkdir -p build/bin
          cargo zigbuild --release --target ${{ matrix.target }} -p scm${{ matrix.app }}
          cp target/${{ matrix.target }}/release/scm${{ matrix.app }} build/bin/

      - name: Package
        run: |
          mkdir -p dist
          APP_DIR="scm${{ matrix.app }}"
          export VERSION=$(grep -m 1 '^version =' ${APP_DIR}/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=${{ github.run_number }}
          
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            nfpm pkg --packager deb --config config/${APP_DIR}-${{ matrix.target }}.yaml --target dist/
          else
            # Replicating your NSIS logic for testing
            makensis -DVERSION="${VERSION}" \
                     -DRELEASE="${RELEASE}" \
                     ${APP_DIR}/package/windows/scm${{ matrix.app }}.nsi
            mv ${APP_DIR}/package/windows/*.exe dist/ 2>/dev/null || true
          fi

      - name: Upload Testing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.app }}-${{ matrix.target }}
          path: dist/*
