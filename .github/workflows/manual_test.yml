name: OpenSCM Manual Build Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Target (client or server)'
        required: true
        default: 'client'
        type: choice
        options:
          - client
          - server

jobs:
  build-and-verify:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "aarch64-unknown-linux-musl"
            arch: "aarch64"
          - target: "x86_64-unknown-linux-musl"
            arch: "x86_64"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Force Install Targets
        # This bypasses the rust-toolchain.toml override issue
        run: |
          rustup target add ${{ matrix.target }}
          rustup component add rust-src --toolchain stable-x86_64-unknown-linux-gnu

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install Build Tools
        run: |
          cargo install cargo-zigbuild
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Version Audit
        id: version_check
        run: |
          # Look inside the app-specific directory for the version
          APP_DIR="${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}"
          VERSION=$(grep -m 1 '^version =' $APP_DIR/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          
          echo "Detected Version in $APP_DIR: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RUN_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Compile Binary
        run: |
          # Building from the subfolder workspace member
          APP_MEMBER="${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}"
          cargo zigbuild --release --target ${{ matrix.target }} -p $APP_MEMBER

      - name: Generate Package (nFPM)
        run: |
          APP_MEMBER="${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}"
          export VERSION=${{ env.VERSION }}
          export RELEASE=${{ env.RUN_ID }}
          export ARCH=${{ matrix.arch }}
          
          mkdir -p dist
          nfpm pkg --packager archlinux \
            --config config/${APP_MEMBER}-${{ matrix.target }}.yaml \
            --target ./dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-${{ matrix.target }}
          path: dist/*
