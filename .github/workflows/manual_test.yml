name: OpenSCM Manual Build Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Target (client or server)'
        required: true
        default: 'client'
        type: choice
        options:
          - client
          - server

jobs:
  build-and-verify:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "aarch64-unknown-linux-musl"
            arch: "aarch64"
          - target: "x86_64-unknown-linux-musl"
            arch: "x86_64"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Force Install Targets
        run: |
          rustup target add ${{ matrix.target }}
          rustup component add rust-src --toolchain stable-x86_64-unknown-linux-gnu

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install Build Tools
        run: |
          cargo install cargo-zigbuild
          # Install nFPM and explicitly add its path to the GitHub Environment
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Version Audit
        id: version_check
        run: |
          # Robust search for Cargo.toml version
          APP_NAME_INPUT="${{ github.event.inputs.app_name }}"
          
          # Try root first, then the scmserver/scmclient subfolders
          if [ -f "Cargo.toml" ]; then
             V_FILE="Cargo.toml"
          elif [ -f "scmserver/Cargo.toml" ] && [ "$APP_NAME_INPUT" == "server" ]; then
             V_FILE="scmserver/Cargo.toml"
          elif [ -f "scmclient/Cargo.toml" ] && [ "$APP_NAME_INPUT" == "client" ]; then
             V_FILE="scmclient/Cargo.toml"
          else
             # Search for any Cargo.toml as a last resort
             V_FILE=$(find . -name Cargo.toml -not -path "*/target/*" | head -n 1)
          fi
          
          VERSION=$(grep -m 1 '^version =' "$V_FILE" | sed 's/.*"\(.*\)".*/\1/')
          echo "Detected Version in $V_FILE: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RUN_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Compile Binary
        run: |
          # Use scmserver (for -bin naming) or scmclient based on input
          APP_MEMBER="${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}"
          cargo zigbuild --release --target ${{ matrix.target }} -p $APP_MEMBER

      - name: Generate Package (nFPM)
        run: |
          APP_MEMBER="${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}"
          
          # These variables are passed into your nfpm.yaml
          export VERSION=${{ env.VERSION }}
          export RELEASE=${{ env.RUN_ID }}
          export ARCH=${{ matrix.arch }}
          
          mkdir -p dist
          # nFPM is now in the PATH thanks to the Install step
          nfpm pkg --packager archlinux \
            --config config/${APP_MEMBER}-${{ matrix.target }}.yaml \
            --target ./dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-${{ matrix.target }}
          path: dist/*
