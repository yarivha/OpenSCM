name: OpenSCM Manual Build Test

# Silences the Node.js 20 deprecation warnings by forcing the runner to Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Target to Build (client or server)'
        required: true
        default: 'client'
        type: choice
        options:
          - client
          - server
      stage:
        description: 'Build Stage'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - stable

jobs:
  build-and-verify:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Targets for your systems development
          - target: "aarch64-unknown-linux-musl"
            arch: "aarch64"
          - target: "x86_64-unknown-linux-musl"
            arch: "x86_64"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig (Fixes 'ring' error)
        uses: goto-bus-stop/setup-zig@v2

      - name: Install Build Tools
        run: |
          cargo install cargo-zigbuild
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Version Audit
        id: version_check
        run: |
          # Kill the "Version Ghost" by detecting version directly from Cargo.toml
          VERSION=$(grep -m 1 '^version =' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Detected Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Uses the GitHub run number as the release ID
          echo "RUN_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Compile Binary
        run: |
          # Handles your scmserver-bin naming convention
          # Logic: if app_name is 'server', build the 'scmserver' package member
          APP_MEMBER=${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}
          cargo zigbuild --release --target ${{ matrix.target }} -p $APP_MEMBER

      - name: Generate Package (nFPM)
        run: |
          export APP_NAME=${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}
          export VERSION=${{ env.VERSION }}
          export RELEASE=${{ env.RUN_ID }}
          export ARCH=${{ matrix.arch }}
          
          mkdir -p dist
          # Points to your existing nFPM configurations
          nfpm pkg --packager archlinux \
            --config config/${APP_NAME}-${{ matrix.target }}.yaml \
            --target ./dist/

      - name: Upload Artifacts for Inspection
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-test-${{ matrix.target }}
          path: dist/*
