name: OpenSCM Manual Build Test

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Target to Build'
        required: true
        default: 'client'
        type: choice
        options:
          - client
          - server
      stage:
        description: 'Stage'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - stable

jobs:
  build-and-verify:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "aarch64-unknown-linux-musl"
            arch: "aarch64"
          - target: "x86_64-unknown-linux-musl"
            arch: "x86_64"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig (Fixes 'ring' error)
        uses: goto-bus-stop/setup-zig@v2

      - name: Install Build Tools
        run: |
          cargo install cargo-zigbuild
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Version Audit
        id: version_check
        run: |
          # Detect version directly from Cargo.toml
          VERSION=$(grep -m 1 '^version =' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Detected Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RUN_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Compile Binary
        run: |
          # Uses scmserver-bin logic if 'server' is selected
          # -p flag ensures we build the correct member of your workspace
          cargo zigbuild --release --target ${{ matrix.target }} -p ${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}

      - name: Generate Package (nFPM)
        run: |
          export APP_NAME=${{ github.event.inputs.app_name == 'server' && 'scmserver' || 'scmclient' }}
          export VERSION=${{ env.VERSION }}
          export RELEASE=${{ env.RUN_ID }}
          export ARCH=${{ matrix.arch }}
          
          mkdir -p dist
          nfpm pkg --packager archlinux \
            --config config/${APP_NAME}-${{ matrix.target }}.yaml \
            --target ./dist/

      - name: Upload Artifacts for Inspection
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-test-${{ matrix.target }}
          path: dist/*
