name: OpenSCM Manual Build & Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Target Application'
        required: true
        default: 'client'
        type: choice
        options:
          - client
          - server

jobs:
  build-and-package:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "aarch64-unknown-linux-musl"
            arch: "aarch64"
          - target: "x86_64-unknown-linux-musl"
            arch: "x86_64"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Build Dependencies
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild
          # Install nFPM and add to path
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Version Audit
        id: version_check
        run: |
          APP_TYPE="${{ github.event.inputs.app_name }}"
          # Determine path based on your scmserver/scmclient directories
          if [ "$APP_TYPE" == "server" ]; then
            V_FILE="scmserver/Cargo.toml"
          else
            V_FILE="scmclient/Cargo.toml"
          fi
          
          VERSION=$(grep -m 1 '^version =' "$V_FILE" | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RUN_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Compile and Stage Binary
        run: |
          APP_TYPE="${{ github.event.inputs.app_name }}"
          APP_MEMBER="scm${APP_TYPE}"
          
          # Cross-compile for the musl target
          cargo zigbuild --release --target ${{ matrix.target }} -p $APP_MEMBER
          
          # Create staging area for nFPM
          mkdir -p build/bin
          cp target/${{ matrix.target }}/release/scm${APP_TYPE} build/bin/
          
          echo "APP_MEMBER=$APP_MEMBER" >> $GITHUB_ENV

      - name: Generate Package (nFPM)
        run: |
          # Export variables for the nfpm.yaml templates
          export APP_NAME="openscm-${{ github.event.inputs.app_name }}"
          export BINARY_NAME="${{ env.APP_MEMBER }}"
          export ARCH="${{ matrix.arch }}"
          export VERSION="${{ env.VERSION }}"
          export RELEASE="${{ env.RUN_ID }}"
          
          mkdir -p dist
          # Points to the specific config: scmclient.yaml or scmserver.yaml
          nfpm pkg --packager archlinux \
            --config "config/${{ env.APP_MEMBER }}.yaml" \
            --target ./dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openscm-${{ github.event.inputs.app_name }}-${{ matrix.arch }}
          path: dist/*
